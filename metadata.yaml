title: "Connection Migration and Multipath Communication in QUIC"
author: "Ki Chun Tong"
advisor: "Pasi Sarolahti"
supervisor: "Salu Ylirisku"
date: "2026-04-24"
degree: "BSc"
school: "School of Electrical Engineering"
program: "Aalto Bachelor's Programme in Science and Technology"
major: "Digital Systems and Design (ELEC3056)"
keywords: "QUIC, connection migration, mobility, multihoming, identity-location problem, TCP"

abstract: |
  Traditional transport protocols associate connection state with IP addresses and port numbers. This design works under stable addressing conditions, but it becomes fragile when hosts move between networks, use multiple interfaces, or experience changes caused by middleboxes such as network address translation devices. In these situations, the network location of an endpoint may change even though the communicating application and transport state remain active. This thesis analyzes how QUIC connection migration mitigates this identity-location problem at the transport layer.
  The thesis first reviews the architectural background of mobility and multihoming, including earlier approaches such as Mobile IP, the Host Identity Protocol, SCTP, Multipath TCP, and application-layer workarounds. It then analyzes the QUIC mechanisms that support connection continuity, especially connection identifiers, path validation, congestion-control behavior after path change, and deployment constraints related to NATs and load balancers. The literature-based analysis is complemented by a small-scale exploratory evaluation using an existing QUIC implementation in a controlled test environment.
  The evaluation compares plain TCP, TCP with explicit reconnect, and QUIC migration under client path or address change. Due to the tight schedule, the experiments could not be repeated systematically enough to support strong quantitative conclusions. The preliminary observations suggest that a best-case TCP reconnect and QUIC migration can restore visible application communication in roughly similar time ranges under the tested conditions. However, the approaches differ in the type of continuity preserved. TCP reconnect restores communication by creating a new transport connection after failure, while QUIC migration can preserve the existing connection context when migration succeeds.
  The thesis concludes that QUIC provides a practical transport-layer mitigation of the identity-location problem. Its main contribution is transport-level continuity across path change, rather than a guaranteed timing improvement or complete solution to mobility and multihoming as general architectural problems.
