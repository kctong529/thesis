title: "Connection Migration and Multipath Communication in QUIC"
author: "Ki Chun Tong"
advisor: "Pasi Sarolahti"
supervisor: "Salu Ylirisku"
date: "2026-07-23"
degree: "BSc"
school: "School of Electrical Engineering"
program: "Aalto Bachelor's Programme in Science and Technology"
major: "Digital Systems and Design (ELEC3056)"
keywords: "QUIC, connection migration, connection continuity, transport-layer mobility, connection identifiers, identity-location coupling"

abstract: |
  Transport protocols such as TCP use IP addresses both for packet delivery and as part of the information that identifies an established connection. This arrangement became a normal part of transport operation under relatively stable addressing conditions, even though IP addresses primarily describe network location. Mobility, multihoming, and address changes caused by middleboxes expose the consequence of this coupling: a change of network location can terminate a transport connection even when the communicating applications and their session remain unchanged. This thesis examines this identity-location coupling and the way QUIC connection migration weakens it. The analysis covers earlier mobility and multihoming approaches, followed by the QUIC mechanisms most relevant to connection continuity, including connection identifiers, path validation, path-specific congestion state, NAT behavior, and deployment constraints. A small exploratory evaluation compares plain TCP, a best-case TCP reconnect with the replacement IP known in advance, and QUIC migration under a forced client path or address change. Plain TCP lost the original connection. The optimized TCP case restored communication through a new connection, while successful QUIC migration preserved the existing connection. No noticeable difference in recovery time was observed between the latter two cases in the preliminary attempts. The results indicate that the main significance of QUIC migration lies in transport continuity. QUIC does not remove the need for network locators, but a change of locator no longer has to terminate the transport connection.
